name: Semver Workflow

on:
  push:
    branches:
      - main
      - beta
      - alpha
      - next
      - next-major
      - '[0-9]+.x'
      - '[0-9]+.[0-9]+.x'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      actions: write
    timeout-minutes: 10
    env:
      DRY_RUN: false
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Release
        id: release
        uses: ridedott/release-me-action@v3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          dry-run: ${{ env.DRY_RUN }}
          release-branches: '["+([0-9])?(.{+([0-9]),x}).x","main","next","next-major",{"name":"beta","prerelease":true},{"name":"alpha","prerelease":true}]'
          release-rules-append: |
            [
              { "release": "patch", "type": "build" },
              { "release": "patch", "type": "chore" },
              { "release": false, "type": "ci" },
              { "release": "patch", "type": "improvement" },
              { "release": "patch", "type": "refactor" },
              { "release": false, "subject": "*\\[skip release\\]*" }
            ]

  helm-publish:
    name: Publish Helm Chart
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update Chart.yaml version
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" helm/flux2-ecr-webhook/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/flux2-ecr-webhook/Chart.yaml
          echo "Chart version set to ${VERSION}"
          cat helm/flux2-ecr-webhook/Chart.yaml

      - name: Login to GHCR
        run: echo "${{ github.token }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push chart
        run: |
          helm package helm/flux2-ecr-webhook
          helm push flux2-ecr-webhook-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
