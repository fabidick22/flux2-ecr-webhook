{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "flux2-ecr-webhook.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flux2-ecr-webhook.labels" . | nindent 4 }}
  {{- $sa := dict }}
  {{- if .Values.serviceAccount.annotations }}
  {{- $sa = .Values.serviceAccount.annotations }}
  {{- end }}
  {{- if .Values.aws.irsaRoleArn }}
  {{- $_ := set $sa "eks.amazonaws.com/role-arn" .Values.aws.irsaRoleArn }}
  {{- end }}
  {{- if $sa }}
  annotations:
    {{- toYaml $sa | nindent 4 }}
  {{- end }}
{{- end }}
